<!doctype html>
<html lang="is">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#115e59" />
    <title>Ökuréttindi & eftirvagnar</title>

    <!-- Tailwind (útlit) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Hvaðan React og lucide eru sótt -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
          "lucide-react": "https://esm.sh/lucide-react@0.383.0?deps=react@18.3.1"
        }
      }
    </script>

    <!-- Babel þýðir JSX beint í vafranum -->
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useMemo, useEffect } from "react";
import { createRoot } from "react-dom/client";
import { Caravan, Car, Truck, AlertTriangle, RotateCcw, Plus, Minus, Check, Scale } from "lucide-react";

const isk = (n) => Math.round(n).toLocaleString("is-IS");

// Flokkar og útlit
const CATS = {
  B:   { code: "B",   name: "Almennt bílpróf",              icon: Car,   tone: "emerald" },
  BE:  { code: "BE",  name: "Kerrupróf — bíll + eftirvagn", icon: Car,   trailer: true, tone: "teal" },
  C1:  { code: "C1",  name: "Millistór vörubíll",           icon: Truck, tone: "amber" },
  C1E: { code: "C1E", name: "C1-vörubíll + eftirvagn",      icon: Truck, trailer: true, tone: "amber" },
  C:   { code: "C",   name: "Stór vörubíll",                icon: Truck, tone: "orange" },
  CE:  { code: "CE",  name: "C-vörubíll + eftirvagn",       icon: Truck, trailer: true, tone: "orange" },
};

const TONE = {
  emerald: { bg: "bg-emerald-50", ring: "bg-emerald-100 text-emerald-700", title: "text-emerald-700", sub: "text-emerald-800", chip: "text-emerald-700" },
  teal:    { bg: "bg-teal-50",    ring: "bg-teal-100 text-teal-700",       title: "text-teal-700",    sub: "text-teal-800",    chip: "text-teal-700" },
  amber:   { bg: "bg-amber-50",   ring: "bg-amber-100 text-amber-700",     title: "text-amber-700",   sub: "text-amber-900",   chip: "text-amber-700" },
  orange:  { bg: "bg-orange-50",  ring: "bg-orange-100 text-orange-700",   title: "text-orange-700",  sub: "text-orange-900",  chip: "text-orange-700" },
};

// Hvaða flokka (B..CE) hver réttindi heimila að aka
const GRANTS = {
  A:   [],
  B:   ["B"],
  BE:  ["B", "BE"],
  C1:  ["B", "C1"],
  C1E: ["B", "BE", "C1", "C1E"],
  C:   ["B", "C1", "C"],
  CE:  ["B", "BE", "C1", "C1E", "C", "CE"],
};

const HELD_CODES = ["A", "B", "BE", "C1", "C1E", "C", "CE"];

function Stepper({ label, hint, icon, value, setValue, min, max, step }) {
  const clamp = (v) => Math.max(min, Math.min(max, v));
  const [text, setText] = useState(String(value));
  useEffect(() => {
    setText(String(value));
  }, [value]);
  const commit = () => {
    const n = Number(text);
    const c = text === "" || Number.isNaN(n) ? min : clamp(n);
    setValue(c);
    setText(String(c));
  };
  return (
    <div>
      <div className="flex items-center gap-2 mb-1 text-slate-600">
        {icon}
        <span className="text-sm font-medium">{label}</span>
      </div>
      {hint && <p className="text-xs text-slate-400 mb-2 ml-6">{hint}</p>}
      <div className="flex items-stretch rounded-xl border border-slate-200 bg-white overflow-hidden">
        <button
          onClick={() => setValue(clamp(value - step))}
          className="px-3 text-slate-500 hover:bg-slate-50 focus:outline-none focus:bg-slate-100 transition"
          aria-label="Minnka"
        >
          <Minus size={18} />
        </button>
        <div className="flex-1 flex items-baseline justify-center gap-1 py-2 border-x border-slate-200">
          <input
            type="number"
            inputMode="numeric"
            value={text}
            onChange={(e) => {
              setText(e.target.value);
              const n = Number(e.target.value);
              if (e.target.value !== "" && !Number.isNaN(n)) setValue(n);
            }}
            onBlur={commit}
            className="w-24 text-center text-2xl font-semibold text-slate-900 tabular-nums bg-transparent focus:outline-none"
          />
          <span className="text-sm text-slate-400">kg</span>
        </div>
        <button
          onClick={() => setValue(clamp(value + step))}
          className="px-3 text-slate-500 hover:bg-slate-50 focus:outline-none focus:bg-slate-100 transition"
          aria-label="Auka"
        >
          <Plus size={18} />
        </button>
      </div>
      <input
        type="range"
        min={min}
        max={max}
        step={step}
        value={value}
        onChange={(e) => setValue(Number(e.target.value))}
        className="w-full mt-3 accent-teal-700"
      />
    </div>
  );
}

function KerruReiknivel() {
  const [car, setCar] = useState(1800);
  const [trailer, setTrailer] = useState(750);
  const [braked, setBraked] = useState("");
  const [tow, setTow] = useState("");
  const [held, setHeld] = useState("");

  const result = useMemo(() => {
    const combined = car + trailer;
    let key, why;

    if (car <= 3500) {
      if (trailer <= 750) {
        key = "B";
        why = "Ökutæki að 3.500 kg og eftirvagn að 750 kg.";
      } else if (combined <= 3500) {
        key = "B";
        why = "Eftirvagn yfir 750 kg, en samtals undir 3.500 kg.";
      } else if (trailer <= 3500) {
        key = "BE";
        why = "Bíll að 3.500 kg með eftirvagn yfir 750 kg og samtals yfir 3.500 kg.";
      } else if (combined <= 12000) {
        key = "C1E";
        why = "Bíll með mjög þungan eftirvagn (yfir 3.500 kg) og samtals að 12.000 kg.";
      } else {
        key = "CE";
        why = "Samtals yfir 12.000 kg.";
      }
    } else if (car <= 7500) {
      if (trailer <= 750) {
        key = "C1";
        why = "Ökutæki 3.500–7.500 kg með eftirvagn að 750 kg.";
      } else if (combined <= 12000) {
        key = "C1E";
        why = "Ökutæki 3.500–7.500 kg með eftirvagn yfir 750 kg og samtals að 12.000 kg.";
      } else {
        key = "CE";
        why = "Ökutæki 3.500–7.500 kg og samtals yfir 12.000 kg.";
      }
    } else {
      if (trailer <= 750) {
        key = "C";
        why = "Ökutæki yfir 7.500 kg með eftirvagn að 750 kg.";
      } else {
        key = "CE";
        why = "Ökutæki yfir 7.500 kg með eftirvagn yfir 750 kg.";
      }
    }

    const towNum = tow === "" ? null : Number(tow);
    const towExceed = towNum !== null && towNum > 0 && trailer > towNum;
    const kgOver = towExceed ? trailer - towNum : 0;

    return { combined, key, why, towNum, towExceed, kgOver };
  }, [car, trailer, tow]);

  const reset = () => {
    setCar(1800);
    setTrailer(750);
    setBraked("");
    setTow("");
    setHeld("");
  };

  const cat = CATS[result.key];
  const tone = TONE[cat.tone];
  const Icon = cat.icon;

  // Duga réttindin sem notandinn er með?
  const heldOk = held === "" ? null : GRANTS[held].includes(result.key);
  const rightsFine =
    car > 3500
      ? { kr: 60000, label: "Akstur ökutækis yfir 3.500 kg án réttinda" }
      : { kr: 40000, label: "Akstur án gildra ökuréttinda" };

  // Öll virk brot í stöðunni
  const fines = [];
  if (result.towExceed) {
    fines.push({ label: "Brot á reglum um tengingu og drátt ökutækja · 70. gr.", kr: 20000 });
  }
  if (result.key !== "B" && held !== "" && heldOk === false) {
    fines.push({ label: `${rightsFine.label} · 58. gr.`, kr: rightsFine.kr });
  }
  const finesTotal = fines.reduce((s, f) => s + f.kr, 0);

  const chips = [
    { label: "Ökutæki", value: car, Icon: Car },
    { label: "Eftirvagn", value: trailer, Icon: Caravan },
    { label: "Samtals", value: result.combined, Icon: Scale },
  ];


  return (
    <div className="min-h-screen bg-slate-50 py-6 px-4 font-sans text-slate-900">
      <div className="max-w-xl mx-auto rounded-2xl border border-slate-200 bg-white shadow-sm overflow-hidden">
        <div className="bg-gradient-to-br from-teal-800 to-teal-600 text-white px-5 py-4 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="rounded-lg bg-white/15 p-2">
              <Caravan size={22} />
            </div>
            <div>
              <h1 className="text-lg font-bold leading-tight tracking-tight">Ökuréttindi & eftirvagnar</h1>
              <p className="text-xs text-teal-100">Hvaða réttindi þarftu?</p>
            </div>
          </div>
          <button
            onClick={reset}
            className="flex items-center gap-1.5 text-xs text-teal-100 hover:text-white rounded-lg px-2.5 py-1.5 hover:bg-white/15 focus:outline-none focus-visible:ring-2 focus-visible:ring-white transition"
          >
            <RotateCcw size={14} /> Núllstilla
          </button>
        </div>

        <div className="p-5 space-y-6">
          <div className="grid sm:grid-cols-2 gap-5">
            <Stepper
              label="Leyfð heildarþyngd ökutækis"
              hint="Bíls eða vörubíls (F.1)"
              icon={<Car size={18} />}
              value={car}
              setValue={setCar}
              min={500}
              max={26000}
              step={50}
            />
            <Stepper
              label="Leyfð heildarþyngd eftirvagns"
              hint="Kerru / eftirvagns (F.1)"
              icon={<Caravan size={18} />}
              value={trailer}
              setValue={setTrailer}
              min={0}
              max={15000}
              step={50}
            />
          </div>

          {/* Niðurstaða: réttindi sem þarf */}
          <div className={`rounded-2xl p-5 ${tone.bg}`}>
            <div className="flex items-center gap-4">
              <div className={`relative shrink-0 rounded-2xl p-3 ${tone.ring}`}>
                <Icon size={30} />
                {cat.trailer && (
                  <span className="absolute -bottom-1.5 -right-1.5 rounded-full bg-white p-1 shadow-sm">
                    <Caravan size={14} className={tone.chip} />
                  </span>
                )}
              </div>
              <div className="min-w-0">
                <div className={`text-4xl font-bold leading-none ${tone.title}`}>{cat.code}</div>
                <div className={`text-sm mt-1 ${tone.sub}`}>{cat.name}</div>
              </div>
            </div>
            <div className={`text-sm mt-3 ${tone.sub}`}>{result.why}</div>
          </div>

          {/* Hemlaður / óhemlaður + dráttargeta + viðvörun ef bíll má ekki draga vagninn */}
          <div>
            <div className="text-xs uppercase tracking-wide font-semibold text-slate-500 mb-2">Er eftirvagninn hemlaður?</div>
            <div className="flex gap-2">
              <button
                onClick={() => { setBraked((b) => (b === "braked" ? "" : "braked")); setTow(""); }}
                aria-pressed={braked === "braked"}
                className={`flex-1 rounded-lg px-4 py-2 text-sm font-medium border transition focus:outline-none focus-visible:ring-2 focus-visible:ring-teal-400 ${
                  braked === "braked" ? "bg-teal-700 text-white border-teal-700 shadow-sm" : "bg-white text-slate-600 border-slate-200 hover:border-teal-600"
                }`}
              >
                Hemlaður
              </button>
              <button
                onClick={() => { setBraked((b) => (b === "unbraked" ? "" : "unbraked")); setTow(""); }}
                aria-pressed={braked === "unbraked"}
                className={`flex-1 rounded-lg px-4 py-2 text-sm font-medium border transition focus:outline-none focus-visible:ring-2 focus-visible:ring-teal-400 ${
                  braked === "unbraked" ? "bg-teal-700 text-white border-teal-700 shadow-sm" : "bg-white text-slate-600 border-slate-200 hover:border-teal-600"
                }`}
              >
                Óhemlaður
              </button>
            </div>

            {braked !== "" && (
              <div className="mt-3">
                <label className="block text-sm text-slate-600 mb-1">
                  Leyfð hámarks dráttargeta ökutækis ({braked === "braked" ? "O.1" : "O.2"})
                </label>
                <input
                  type="number"
                  inputMode="numeric"
                  value={tow}
                  onChange={(e) => setTow(e.target.value)}
                  placeholder="t.d. 1500"
                  className="w-full rounded-xl border border-slate-200 px-3 py-2 text-slate-900 tabular-nums focus:outline-none focus:border-teal-600 focus:ring-2 focus:ring-teal-100"
                />
                <p className="text-xs text-slate-400 mt-1">
                  Reitur {braked === "braked" ? "O.1 (hemlaður eftirvagn)" : "O.2 (óhemlaður eftirvagn)"} í
                  skráningarskírteini.
                </p>

                {result.towExceed && (
                  <div className="mt-3 rounded-xl bg-rose-50 border border-rose-200 p-3">
                    <div className="flex gap-2">
                      <AlertTriangle size={16} className="shrink-0 mt-0.5 text-rose-600" />
                      <div className="text-sm text-rose-800">
                        <span className="font-semibold">Bíllinn má ekki draga þennan eftirvagn.</span> Eftirvagninn
                        ({isk(trailer)} kg) er {isk(result.kgOver)} kg þyngri en ökutækið má draga ({isk(result.towNum)} kg,{" "}
                        {braked === "braked" ? "O.1" : "O.2"}) — brot á reglum um tengingu og drátt.
                      </div>
                    </div>
                    <div className="mt-3 rounded-lg bg-white p-3">
                      <div className="text-xs uppercase tracking-wide font-semibold text-rose-700">Áætluð sekt</div>
                      <div className="text-2xl font-bold text-rose-700 tabular-nums mt-1">{isk(20000)} kr</div>
                      <div className="text-xs text-rose-800 mt-1">Brot á reglum um tengingu og drátt ökutækja · 70. gr.</div>
                      <div className="text-xs text-rose-500 mt-1">25% afsláttur ef greitt er innan 30 daga.</div>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* Ert þú með réttindin? (birtist þegar meira en B þarf) */}
          {result.key !== "B" && (
            <div>
              <div className="text-xs uppercase tracking-wide font-semibold text-slate-500 mb-2">Gild ökuréttindi</div>
              <div className="flex flex-wrap gap-2">
                {HELD_CODES.map((code) => (
                  <button
                    key={code}
                    onClick={() => setHeld((h) => (h === code ? "" : code))}
                    aria-pressed={held === code}
                    className={`rounded-lg px-4 py-2 text-sm font-semibold border transition focus:outline-none focus-visible:ring-2 focus-visible:ring-teal-400 ${
                      held === code ? "bg-teal-700 text-white border-teal-700 shadow-sm" : "bg-white text-slate-700 border-slate-200 hover:border-teal-600"
                    }`}
                  >
                    {code}
                  </button>
                ))}
              </div>

              {held !== "" && heldOk && (
                <div className="mt-3 rounded-xl bg-emerald-50 border border-emerald-200 p-3 flex gap-2">
                  <Check size={16} className="shrink-0 mt-0.5 text-emerald-600" />
                  <div className="text-sm text-emerald-800">
                    {held}-réttindi duga fyrir {result.key}. Þú mátt draga þennan eftirvagn.
                  </div>
                </div>
              )}

              {held !== "" && heldOk === false && (
                <div className="mt-3 rounded-xl bg-rose-50 border border-rose-200 p-3">
                  <div className="flex gap-2">
                    <AlertTriangle size={16} className="shrink-0 mt-0.5 text-rose-600" />
                    <div className="text-sm text-rose-800">
                      <span className="font-semibold">Ónæg réttindi.</span> {result.key}-réttindi þarf fyrir þessa
                      samsetningu.
                    </div>
                  </div>
                  <div className="mt-3 rounded-lg bg-white p-3">
                    <div className="text-xs uppercase tracking-wide font-semibold text-rose-700">Áætluð sekt (fyrsta brot)</div>
                    <div className="text-2xl font-bold text-rose-700 tabular-nums mt-1">{isk(rightsFine.kr)} kr</div>
                    <div className="text-xs text-rose-800 mt-1">{rightsFine.label} · 0 refsipunktar · 58. gr.</div>
                    <div className="text-xs text-rose-500 mt-1">25% afsláttur ef greitt er innan 30 daga.</div>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Þyngdir */}
          <div className="grid grid-cols-3 gap-2 text-center">
            {chips.map((c) => (
              <div key={c.label} className="rounded-xl border border-slate-200 py-3">
                <c.Icon size={16} className="mx-auto text-slate-400" />
                <div className="text-xs text-slate-500 mt-1">{c.label}</div>
                <div className="text-lg font-semibold text-slate-900 tabular-nums mt-0.5">{isk(c.value)}</div>
                <div className="text-xs text-slate-400">kg</div>
              </div>
            ))}
          </div>

          {/* Samtals sektir þegar brotin eru fleiri en eitt */}
          {fines.length >= 2 && (
            <div className="rounded-2xl bg-rose-50 border border-rose-200 p-4">
              <div className="text-xs uppercase tracking-wide font-semibold text-rose-700 mb-2">
                Samtals áætlaðar sektir — {fines.length} brot
              </div>
              <div className="space-y-1.5">
                {fines.map((f) => (
                  <div key={f.label} className="flex items-baseline justify-between gap-3 text-sm text-rose-800">
                    <span>{f.label}</span>
                    <span className="tabular-nums font-medium whitespace-nowrap">{isk(f.kr)} kr</span>
                  </div>
                ))}
              </div>
              <div className="mt-2 pt-2 border-t border-rose-200 flex items-baseline justify-between">
                <span className="text-sm font-semibold text-rose-800">Samtals</span>
                <span className="text-2xl font-bold text-rose-700 tabular-nums">{isk(finesTotal)} kr</span>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

createRoot(document.getElementById("root")).render(<KerruReiknivel />);

    </script>
  </body>
</html>
